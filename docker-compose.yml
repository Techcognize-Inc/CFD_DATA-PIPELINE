version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: de2-postgres
    environment:
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bankingdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: de2-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"


  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: de2-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Host access (producer on your laptop)
      # Container access (Spark inside Docker)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1


  spark-master:
    image: apache/spark:3.5.7
    container_name: de2-spark-master
    ports:
      - "8088:8080"
      - "7077:7077"
    environment:
      SPARK_NO_DAEMONIZE: "true"
      HOME: /tmp
      SPARK_LOCAL_DIRS: /tmp/spark-local
    volumes:
      - ./spark:/opt/spark-apps
      - ./spark/.ivy2:/tmp/.ivy2
      - ./spark/.cache:/tmp/.cache
    command: >
      /opt/spark/sbin/start-master.sh
      --host spark-master
      --port 7077
      --webui-port 8080


  spark-worker:
    image: apache/spark:3.5.7
    container_name: de2-spark-worker
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    environment:
      SPARK_NO_DAEMONIZE: "true"
      HOME: /tmp
      SPARK_LOCAL_DIRS: /tmp/spark-local
    volumes:
      - ./spark:/opt/spark-apps
      - ./spark/.ivy2:/tmp/.ivy2
      - ./spark/.cache:/tmp/.cache
    command: >
      /opt/spark/sbin/start-worker.sh
      spark://spark-master:7077
      --webui-port 8081


volumes:
  postgres_data: