services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: de2-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: de2-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL

  postgres:
    image: postgres:15
    container_name: de2-postgres
    environment:
      POSTGRES_USER: frauduser
      POSTGRES_PASSWORD: fraudpass
      POSTGRES_DB: bankingdb
    ports:
      - "5432:5432"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./sql:/opt/sql
      - postgres_data:/var/lib/postgresql/data

  spark-master:
    image: apache/spark:3.5.7
    container_name: de2-spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8088:8080"
    volumes:
      - ./spark:/opt/spark-apps
      - ./data:/opt/data
    depends_on:
      - kafka
      - postgres

  spark-worker:
    image: apache/spark:3.5.7
    container_name: de2-spark-worker
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
    ports:
      - "8081:8081"
    volumes:
      - ./spark:/opt/spark-apps
      - ./data:/opt/data
    depends_on:
      - spark-master

  airflow-init:
    image: apache/airflow:2.10.0
    container_name: de2-airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./:/opt/project
      - airflow_data:/opt/airflow
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "airflow db init &&
               airflow users create
               --username airflow
               --password airflow
               --firstname Airflow
               --lastname Admin
               --role Admin
               --email airflow@example.com"

  airflow-webserver:
    image: apache/airflow:2.10.0
    container_name: de2-airflow-webserver
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./:/opt/project
      - airflow_data:/opt/airflow
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8085:8080"
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.10.0
    container_name: de2-airflow-scheduler
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./:/opt/project
      - airflow_data:/opt/airflow
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler

volumes:
  postgres_data:
  airflow_data: